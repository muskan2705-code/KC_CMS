services:
  - type: web
    name: kc-fixit-cms
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    disk:
      name: kc-fixit-uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: kc-fixit-db
          property: connectionString
      - key: DATABASE_SSL
        value: false
      - key: CORS_ORIGIN
        value: https://kcfixit.com,https://www.kcfixit.com
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: kc-fixit-db
    plan: starter
